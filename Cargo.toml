[package]
name = "AEONS"
version = "0.1.0"
edition = "2024"

[profile.dev.package."*"]
opt-level = 3

[dependencies]
bevy = { version = "0.18.0", features = ["default", "bevy_winit", "bevy_render", "bevy_pbr", "bevy_gizmos", "bevy_gizmos_render", "bevy_dev_tools"] }
burn = "0.20.1"
serde = { version = "1.0", features = ["derive"] }
bincode = {version = "2.0.1", features = ["serde"]}
image = "0.25"
zstd = "0.13"
rayon = "1.10"
bevy-inspector-egui = "0.36.0"
log = "0.4.29"
rand = "0.10.0"
